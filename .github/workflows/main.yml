name: Build Artifact

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang lld xxd unzip wget python3 pkg-config

      - name: Install PS5 Payload SDK + pacbrew libs
        run: |
          curl -fsSL https://github.com/ps5-payload-dev/pacbrew-repo/releases/latest/download/ps5-payload-dev.tar.gz -o /tmp/sdk.tar.gz
          sudo tar -xzf /tmp/sdk.tar.gz -C /
          ls /opt/ps5-payload-sdk/bin | head

      - name: Build
        run: make PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonicloader
          path: sonic-loader.elf

      - name: Publish ELF to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          LATEST_TAG=$(gh release view --json tagName -jq .tagName || echo "")
          
          if [ -z "$LATEST_TAG" ]; then
            echo "Nenhum release encontrado neste repositório. Pulei o upload. Crie um release primeiro."
            exit 0
          fi
          
          echo "Alvo: Release ${LATEST_TAG}"
          
          gh release upload "$LATEST_TAG" sonic-loader.elf --clobber
