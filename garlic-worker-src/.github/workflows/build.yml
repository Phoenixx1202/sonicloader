name: Build
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang lld xxd unzip wget
      - name: Download SDKs
        run: |
          wget -q https://github.com/ps5-payload-dev/sdk/releases/latest/download/ps5-payload-sdk.zip
          unzip -q ps5-payload-sdk.zip -d ps5-sdk
          wget -q https://github.com/ps4-payload-dev/sdk/releases/latest/download/ps4-payload-sdk.zip
          unzip -q ps4-payload-sdk.zip -d ps4-sdk
      - name: Compute version
        id: ver
        run: echo "v=$(git describe --tags --always 2>/dev/null || echo dev)" >> $GITHUB_OUTPUT
      - name: Build PS5
        run: make ps5 PS5_PAYLOAD_SDK=$PWD/ps5-sdk/ps5-payload-sdk WORKER_VERSION=${{ steps.ver.outputs.v }}
      - name: Build PS4
        run: make ps4 PS4_PAYLOAD_SDK=$PWD/ps4-sdk/ps4-payload-sdk WORKER_VERSION=${{ steps.ver.outputs.v }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: garlic-worker
          path: |
            garlic-worker-ps5.elf
            garlic-worker-ps4.elf
